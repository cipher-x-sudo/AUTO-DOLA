services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autodola
      POSTGRES_USER: autodola
      POSTGRES_PASSWORD: autodola
    volumes:
      - auto_dola_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodola -d autodola"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - auto_dola_redis:/data

  browser:
    build:
      context: ./browser
    shm_size: "1gb"
    ports:
      - "6080:6080"
      - "9222:7070"
    volumes:
      - auto_dola_browser_profile:/data/browser-profile
      - auto_dola_logs:/data/logs

  api:
    build:
      context: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://autodola:autodola@postgres:5432/autodola
      REDIS_URL: redis://redis:6379/0
      OUTPUT_DIR: /data/downloads
      PROFILE_DIR: /data/profiles
      LOG_DIR: /data/logs
      NICHES_DIR: /data/niches
      GENERATED_PROMPTS_DIR: /data/generated-prompts
      DOLA_MODE: hybrid
      DOLA_BROWSER_CDP_URL: http://browser:7070
      DOLA_BROWSER_MANAGER_URL: http://browser:7070
      DOLA_BROWSER_MANUAL_URL: http://localhost:6080
    ports:
      - "${AUTO_DOLA_API_PORT:-8000}:8000"
    volumes:
      - type: bind
        source: ${AUTO_DOLA_DOWNLOADS_DIR:-${USERPROFILE}/Downloads/AUTO-DOLA}
        target: /data/downloads
      - auto_dola_profiles:/data/profiles
      - auto_dola_logs:/data/logs
      - ./niches:/data/niches:ro
      - ./generated-prompts:/data/generated-prompts
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      browser:
        condition: service_started

  worker:
    build:
      context: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-m", "app.worker"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://autodola:autodola@postgres:5432/autodola
      REDIS_URL: redis://redis:6379/0
      OUTPUT_DIR: /data/downloads
      PROFILE_DIR: /data/profiles
      LOG_DIR: /data/logs
      NICHES_DIR: /data/niches
      GENERATED_PROMPTS_DIR: /data/generated-prompts
      DOLA_MODE: hybrid
      DOLA_BROWSER_CDP_URL: http://browser:7070
      DOLA_BROWSER_MANAGER_URL: http://browser:7070
      DOLA_BROWSER_MANUAL_URL: http://localhost:6080
    volumes:
      - type: bind
        source: ${AUTO_DOLA_DOWNLOADS_DIR:-${USERPROFILE}/Downloads/AUTO-DOLA}
        target: /data/downloads
      - auto_dola_profiles:/data/profiles
      - auto_dola_logs:/data/logs
      - ./niches:/data/niches:ro
      - ./generated-prompts:/data/generated-prompts
      - ./secrets:/run/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      browser:
        condition: service_started

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:${AUTO_DOLA_API_PORT:-8000}
        VITE_OUTPUT_LABEL: ${AUTO_DOLA_OUTPUT_LABEL:-Downloads/AUTO-DOLA}
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  auto_dola_pgdata:
  auto_dola_redis:
  auto_dola_profiles:
  auto_dola_logs:
  auto_dola_browser_profile:
