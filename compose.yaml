services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autodola
      POSTGRES_USER: autodola
      POSTGRES_PASSWORD: autodola
    volumes:
      - auto_dola_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodola -d autodola"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - auto_dola_redis:/data

  api:
    build:
      context: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://autodola:autodola@postgres:5432/autodola
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - auto_dola_outputs:/data/outputs
      - auto_dola_profiles:/data/profiles
      - auto_dola_logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://autodola:autodola@postgres:5432/autodola
      REDIS_URL: redis://redis:6379/0
    volumes:
      - auto_dola_outputs:/data/outputs
      - auto_dola_profiles:/data/profiles
      - auto_dola_logs:/data/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  auto_dola_pgdata:
  auto_dola_redis:
  auto_dola_outputs:
  auto_dola_profiles:
  auto_dola_logs:
